# Warehouse — Project Manifest
#
# Per the PlatformManifest 3-layer design (Velascat/PlatformManifest):
#   PlatformManifest (public, reusable)
#     + ProjectManifest (this file — Warehouse)
#     + LocalManifest   (per-machine; topology/local_manifest.yaml, gitignored)
#     = EffectiveRepoGraph  (consumed by OperationsCenter)
#
# Warehouse is a staging ground for preparing code context for LLMs
# (kits/crates/pallets/yards). It is consumed by VideoFoundry (and
# potentially other private projects). Like VideoFoundry, Warehouse is
# private — it does not belong in the public PlatformManifest.

manifest_kind: project
manifest_version: "1.0.0"

platform_manifest:
  name: PlatformManifest
  version_constraint: ">=0.3,<2.0"

repos:

  warehouse:
    canonical_name: Warehouse
    visibility: private
    github_url: https://github.com/Velascat/Warehouse
    runtime_role: managed_repo

edges:

  # OperationsCenter dispatches audit and maintenance runs against
  # Warehouse as a managed repo (Custodian sweeps, ghost/flow audits,
  # coverage analysis). Same pattern as VideoFoundry.
  - {from: OperationsCenter, to: Warehouse, type: dispatches_to}
